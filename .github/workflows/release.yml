name: Release

# Triggered by pushing a tag like `v0.1.0`.
# Each tag produces a draft GitHub Release with installers for macOS
# (arm64 + x64), Windows (x64) and Linux (x64) attached as assets.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      # Keep building the other OSes even if one fails — a partial release
      # is strictly more useful than none.
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: "--bundles deb,appimage"
            rust-target: ""
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build & bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # First runner to reach this step creates a draft Release for the
          # tag; subsequent runners attach their artifacts to the same one.
          tagName: ${{ github.ref_name }}
          releaseName: "Tide ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            - **macOS Apple Silicon:** `.dmg` with `aarch64` in the name
            - **macOS Intel:** `.dmg` with `x64` in the name
            - **Windows:** `.msi` or `-setup.exe`
            - **Linux:** `.AppImage` (portable) or `.deb`

            First launch on unsigned platforms:
            - macOS: right-click the app → **Open** the first time
            - Windows: SmartScreen → **More info → Run anyway**
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
