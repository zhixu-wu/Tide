name: CI

# Runs on every push to main and every PR to catch compile/type errors early.
# Tag pushes are skipped — the Release workflow already builds the same code
# on the same platforms, so doubling up would just burn CI minutes.
on:
  push:
    branches: [main, master]
    tags-ignore: ["v*"]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: cargo check --manifest-path src-tauri/Cargo.toml
